# ==============================================================================
# Stock Picker Engine 80.40 - konfiguracja główna (TRAFIA DO GITA)
# ==============================================================================
# Lokalne nadpisania (np. ssl-trust-all=true dla korpo proxy) trzymaj w
# application-local.properties (w .gitignore).

# --- Serwer ---
server.port=8080
spring.application.name=stockpicker-engine

# --- Profile ---
# Automatycznie ładuj profil 'local' jeśli istnieje plik application-local.properties.
# Dzięki temu użytkownik nie musi pamiętać o dodawaniu --spring.profiles.active=local.
# Jeśli ktoś klonuje repo i nie ma tego pliku, aplikacja wystartuje bez błędu.
spring.profiles.active=local

# --- Logi ---
logging.level.root=WARN
logging.level.pl.rafal.stockpicker=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Stooq ---
# base-url: historyczne CSV per ticker (publiczne, bez consent wall).
# wig20-composition-url: tabela składu WIG20 (za consent wall, fetchowana Playwrightem).
stockpicker.stooq.base-url=https://stooq.pl/q/d/l/
stockpicker.stooq.wig20-composition-url=https://stooq.pl/t/?i=532&v=4
stockpicker.stooq.timeout-seconds=10
stockpicker.stooq.request-delay-ms=200

# Domyślnie walidacja SSL włączona. Ustaw na true w application-local.properties
# jeśli pracujesz w sieci firmowej z SSL inspection (DXC/Zscaler/itp.).
stockpicker.stooq.ssl-trust-all=false
