# ==============================================================================
# Stock Picker Engine 80.40 - konfiguracja główna (TRAFIA DO GITA)
# ==============================================================================
# Sekrety i poświadczenia są w application-local.properties (w .gitignore).

# --- Serwer ---
server.port=8080
spring.application.name=stockpicker-engine

# --- Profile ---
# Automatycznie ładuj profil 'local' jeśli istnieje plik application-local.properties.
# Dzięki temu użytkownik nie musi pamiętać o dodawaniu --spring.profiles.active=local.
# Jeśli ktoś klonuje repo i nie ma tego pliku, aplikacja wystartuje bez błędu.
spring.profiles.active=local

# --- Logi ---
logging.level.root=WARN
logging.level.pl.rafal.stockpicker=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Stooq - konfiguracja niesekretna ---
# login-url = strona bootstrapująca sesję (zawiera formularz logowania w headerze).
# Historycznie stooq miał /login/, ale obecnie ten URL zwraca 404 - formularz
# logowania jest wbudowany w header strony głównej. GET na / pobiera ciasteczka
# sesyjne/CMP i dostarcza formularza, z którego wyciągamy prawdziwy action URL.
stockpicker.stooq.base-url=https://stooq.pl/q/d/l/
stockpicker.stooq.login-url=https://stooq.pl/
# /q/i/?s=wig20 to strona INDEKSU (chart, OHLCV samego WIG20) - nie ma tam listy
# komponentów. Komponenty są pod /q/?s=wig20 (widok kwotowania) - tam stooq pokazuje
# pod chartem tabelę 20 spółek z aktualnymi kursami.
stockpicker.stooq.wig20-url=https://stooq.pl/q/?s=wig20
stockpicker.stooq.timeout-seconds=10
stockpicker.stooq.request-delay-ms=200

# Puste wartości domyślne - nadpisywane przez application-local.properties.
# Jeśli login-enabled=false, aplikacja działa w trybie anonimowym.
stockpicker.stooq.login=
stockpicker.stooq.password=
stockpicker.stooq.login-enabled=false

# Domyślnie walidacja SSL włączona. Ustaw na true w application-local.properties
# jeśli pracujesz w sieci firmowej z SSL inspection (DXC/Zscaler/itp.).
stockpicker.stooq.ssl-trust-all=false
